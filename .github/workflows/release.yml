name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Auto-increment level for the new tag. You must pick one."
        required: true
        type: choice
        options:
          - "(pick one)"
          - major
          - minor
          - patch

permissions:
  contents: read

env:
  DOTNET_NOLOGO: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true

jobs:
  # ============================
  # BUILD: compute the version, tag, build/pack, and produce the release notes.
  # Packages are uploaded UNSIGNED for the container sign job to pick up.
  # ============================
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      version: ${{ steps.ver.outputs.version }}
      tag: ${{ steps.ver.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          fetch-tags: true
          filter: tree:0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            10.0.x

      - name: Compute next version + create tag
        id: ver
        env:
          BUMP: ${{ inputs.bump }}
        run: |
          # MinVer is tag-first and won't compute a clean RTM version when the
          # working commit is past the latest tag (it appends pre-release +
          # height by design). So compute the bump in shell from the latest
          # RTM tag, tag HEAD, push — then propagate the version through
          # MINVERVERSIONOVERRIDE so every downstream MSBuild project skips
          # MinVer's per-project git walk and stamps this exact value.
          case "$BUMP" in
            major|minor|patch) ;;
            *) echo "Pick a bump level (major / minor / patch)." >&2; exit 1 ;;
          esac
          LAST="$(git tag --list 'v[0-9]*.[0-9]*.[0-9]*' \
                  | grep -Ev -- '-' \
                  | sort -V \
                  | tail -1 \
                  | sed 's/^v//')"
          if [ -z "$LAST" ]; then
            echo "No RTM tag (vX.Y.Z) found in history." >&2
            exit 1
          fi
          IFS=. read -r MAJ MIN PAT <<<"$LAST"
          case "$BUMP" in
            major) VERSION="$((MAJ+1)).0.0" ;;
            minor) VERSION="${MAJ}.$((MIN+1)).0" ;;
            patch) VERSION="${MAJ}.${MIN}.$((PAT+1))" ;;
          esac
          echo "Latest RTM tag: v$LAST -> next: v$VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"
          echo "MINVERVERSIONOVERRIDE=$VERSION" >> "$GITHUB_ENV"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git tag "v$VERSION"
          git push origin "v$VERSION"

      - name: Restore
        run: dotnet restore src/GitReleaseNoteGenerator.slnx

      - name: Build
        run: dotnet build src/GitReleaseNoteGenerator.slnx --no-restore --configuration Release

      - name: Generate release notes
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: dotnet run --project src/GitReleaseNoteGenerator/GitReleaseNoteGenerator.csproj --no-build --configuration Release --framework net10.0 -- --release-version "${{ steps.ver.outputs.version }}" --output-file "${{ github.workspace }}/release-notes.md"

      - name: Verify release notes exist
        run: |
          if [ ! -f "${{ github.workspace }}/release-notes.md" ]; then
            echo "Error: release-notes.md was not generated"
            exit 1
          fi
          echo "Release notes file size: $(wc -c < "${{ github.workspace }}/release-notes.md") bytes"
          echo "--- Preview ---"
          head -20 "${{ github.workspace }}/release-notes.md"

      - name: Pack
        run: dotnet pack src/GitReleaseNoteGenerator.slnx --no-build --configuration Release -o packages

      - name: Upload unsigned packages
        uses: actions/upload-artifact@v4
        with:
          name: unsigned-nuget
          path: packages/*.nupkg
          if-no-files-found: error

      - name: Upload release notes
        uses: actions/upload-artifact@v4
        with:
          name: release-notes
          path: release-notes.md
          if-no-files-found: error

  # ============================
  # SIGN with Certum SimplySign — runs inside the prebuilt signer container
  # (SimplySign + jsign + .NET baked in). Certum SimplySign is GUI middleware
  # with no headless API, so the certum-sign action drives it under Xvfb and
  # signs with jsign over PKCS#11 — Linux only. packages:read lets this job's
  # token pull the GHCR image.
  # ============================
  sign:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: read
      packages: read
    container:
      image: ghcr.io/reactiveui/certum-signer:latest
      credentials:
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}
    # Map the Certum secrets into env so the composite action (which cannot
    # declare secret-typed inputs) can read them.
    env:
      CERTUM_USER_ID: ${{ secrets.CERTUM_USER_ID }}
      CERTUM_OTP_URI: ${{ secrets.CERTUM_OTP_URI }}
      CERTUM_CERT_FINGERPRINT: ${{ secrets.CERTUM_CERT_FINGERPRINT }}
    steps:
      - name: Download unsigned packages
        uses: actions/download-artifact@v4
        with:
          name: unsigned-nuget
          path: signed

      - name: Sign packages with Certum SimplySign (prebuilt image)
        uses: reactiveui/actions-common/.github/actions/certum-sign@main
        with:
          packages-glob: 'signed/*.nupkg'
          prebuilt: 'true'

      - name: Upload signed packages
        uses: actions/upload-artifact@v4
        with:
          name: signed-nuget
          path: signed/*.nupkg
          if-no-files-found: error

  # ============================
  # PUBLISH: push the signed packages to NuGet (OIDC trusted publishing) and
  # cut the GitHub release. gh + the OIDC login run on the host, not the
  # signer container.
  # ============================
  publish:
    needs: [build, sign]
    runs-on: ubuntu-latest
    environment:
      name: release
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Download signed packages
        uses: actions/download-artifact@v4
        with:
          name: signed-nuget
          path: signed

      - name: Download release notes
        uses: actions/download-artifact@v4
        with:
          name: release-notes
          path: .

      - name: NuGet login (OIDC trusted publishing)
        uses: NuGet/login@v1
        id: nuget-login
        with:
          user: ${{ secrets.NUGET_USER }}

      - name: Push to NuGet
        run: |
          for pkg in ./signed/*.nupkg; do
            dotnet nuget push "$pkg" --source https://api.nuget.org/v3/index.json --api-key ${{ steps.nuget-login.outputs.NUGET_API_KEY }}
          done

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "${{ needs.build.outputs.tag }}" --repo "${{ github.repository }}" --title "${{ needs.build.outputs.version }}" --notes-file release-notes.md
